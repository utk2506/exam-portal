events {}

http {
    # Docker internal DNS resolver
    resolver 127.0.0.11 valid=30s;

    server {
        listen 80;
        server_name exam.chimeratechnologies.com;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name exam.chimeratechnologies.com;

        ssl_certificate /etc/letsencrypt/live/exam.chimeratechnologies.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/exam.chimeratechnologies.com/privkey.pem;

        # Use variables to force runtime resolution and prevent Nginx startup failure
        set $frontend_upstream "http://frontend:4173";
        set $api_upstream      "http://api:8080";

        location / {
            proxy_pass $frontend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api {
            proxy_pass $api_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
